<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>otel-gui</title>
  <!-- Trace waterfall visualization -->
  <rect x="4" y="6" width="20" height="3" rx="1.5" fill="#4F46E5" opacity="0.9"/>
  <rect x="8" y="11" width="16" height="3" rx="1.5" fill="#7C3AED" opacity="0.85"/>
  <rect x="12" y="16" width="12" height="3" rx="1.5" fill="#2563EB" opacity="0.8"/>
  <rect x="8" y="21" width="10" height="3" rx="1.5" fill="#059669" opacity="0.85"/>
  <!-- Connection lines -->
  <line x1="6" y1="9" x2="10" y2="11" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="14" x2="14" y2="16" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="14" x2="10" y2="21" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
</svg>