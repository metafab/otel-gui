name: Release Binaries

on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check tag exists
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! git ls-remote --exit-code --refs --tags "https://github.com/${REPO}.git" "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag '${TAG}' does not exist in this repository."
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: macos-x64
            cross_arch: true
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: win-x64

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit app
        run: pnpm run build

      - name: Generate SEA launcher
        run: pnpm run sea:bundle

      - name: Download Node x64 binary (macOS cross-compilation)
        if: matrix.cross_arch == true
        run: |
          NODE_VERSION=$(node --version | cut -c2-)
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" \
            -o /tmp/node-x64.tar.gz
          tar -xzf /tmp/node-x64.tar.gz -C /tmp
          echo "X64_NODE=/tmp/node-v${NODE_VERSION}-darwin-x64/bin/node" >> $GITHUB_ENV

      - name: Build SEA binary
        shell: bash
        run: |
          if [ "${{ matrix.cross_arch }}" = "true" ]; then
            pnpm run sea:package:target -- --target ${{ matrix.platform }} --node-binary "$X64_NODE"
          else
            pnpm run sea:package:binary
          fi

      - name: Prune dev dependencies
        run: pnpm prune --prod

      - name: Copy production node_modules into platform dir (Linux / macOS)
        if: runner.os != 'Windows'
        run: rsync -a node_modules/ dist/binaries/otel-gui-${{ matrix.platform }}/node_modules/

      - name: Copy production node_modules into platform dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          robocopy node_modules dist\binaries\otel-gui-${{ matrix.platform }}\node_modules /E /R:0 /W:0 /NJH /NJS /NFL /NDL /NP
          if ($LASTEXITCODE -le 7) { exit 0 }
          exit $LASTEXITCODE

      - name: Create archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist/binaries
          tar -czf otel-gui-${{ matrix.platform }}.tar.gz otel-gui-${{ matrix.platform }}/
          shasum -a 256 otel-gui-${{ matrix.platform }}.tar.gz \
            > otel-gui-${{ matrix.platform }}.tar.gz.sha256

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist/binaries
          Compress-Archive -Path otel-gui-${{ matrix.platform }}/ `
            -DestinationPath otel-gui-${{ matrix.platform }}.zip
          (Get-FileHash otel-gui-${{ matrix.platform }}.zip -Algorithm SHA256).Hash + `
            "  otel-gui-${{ matrix.platform }}.zip" | `
            Out-File -Encoding ascii otel-gui-${{ matrix.platform }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: otel-gui-${{ matrix.platform }}
          path: |
            dist/binaries/otel-gui-${{ matrix.platform }}.tar.gz
            dist/binaries/otel-gui-${{ matrix.platform }}.tar.gz.sha256
            dist/binaries/otel-gui-${{ matrix.platform }}.zip
            dist/binaries/otel-gui-${{ matrix.platform }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: Publish Release Assets
    needs: [validate, build]
    if: always() && needs.build.result == 'success' && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/** --clobber
          else
            gh release create "$TAG" artifacts/** --verify-tag --title "$TAG" --generate-notes
          fi

  update-homebrew-tap:
    name: Update Homebrew tap formula
    needs: [release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Build formula content
        id: formula
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          OWNER_REPO="${{ github.repository }}"

          sha_linux_x64=$(awk '{print $1}' artifacts/otel-gui-linux-x64.tar.gz.sha256)
          sha_linux_arm64=$(awk '{print $1}' artifacts/otel-gui-linux-arm64.tar.gz.sha256)
          sha_macos_x64=$(awk '{print $1}' artifacts/otel-gui-macos-x64.tar.gz.sha256)
          sha_macos_arm64=$(awk '{print $1}' artifacts/otel-gui-macos-arm64.tar.gz.sha256)

          cat > /tmp/otel-gui.rb <<EOF
          class OtelGui < Formula
            desc "Lightweight OpenTelemetry trace viewer"
            homepage "https://github.com/${OWNER_REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${OWNER_REPO}/releases/download/${TAG}/otel-gui-macos-arm64.tar.gz"
                sha256 "${sha_macos_arm64}"
              else
                url "https://github.com/${OWNER_REPO}/releases/download/${TAG}/otel-gui-macos-x64.tar.gz"
                sha256 "${sha_macos_x64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${OWNER_REPO}/releases/download/${TAG}/otel-gui-linux-arm64.tar.gz"
                sha256 "${sha_linux_arm64}"
              else
                url "https://github.com/${OWNER_REPO}/releases/download/${TAG}/otel-gui-linux-x64.tar.gz"
                sha256 "${sha_linux_x64}"
              end
            end

            def install
              libexec.install "otel-gui", "build", "proto", "node_modules"
              (bin/"otel-gui").write <<~EOS
                #!/bin/bash
                exec "#{libexec}/otel-gui" "$@"
              EOS
            end

            test do
              assert_path_exist libexec/"otel-gui"
            end
          end
          EOF

      - name: Checkout Homebrew tap repository
        uses: actions/checkout@v5
        with:
          repository: metafab/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula file
        run: |
          mkdir -p homebrew-tap/Formula
          cp /tmp/otel-gui.rb homebrew-tap/Formula/otel-gui.rb

      - name: Commit and push formula update
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/otel-gui.rb

          if git diff --cached --quiet -- Formula/otel-gui.rb; then
            echo "No formula changes detected"
            exit 0
          fi

          git commit -m "Update otel-gui formula for ${TAG}"
          git push
