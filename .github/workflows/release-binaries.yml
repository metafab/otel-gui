name: Release Binaries

on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-tags: true
      - name: Check tag exists
        run: |
          if ! git tag --list | grep -qx "${{ inputs.tag }}"; then
            echo "::error::Tag '${{ inputs.tag }}' does not exist in this repository."
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: macos-x64
            cross_arch: true
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: win-x64

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit app
        run: pnpm run build

      - name: Generate SEA launcher
        run: pnpm run sea:bundle

      - name: Download Node x64 binary (macOS cross-compilation)
        if: matrix.cross_arch == true
        run: |
          NODE_VERSION=$(node --version | cut -c2-)
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" \
            -o /tmp/node-x64.tar.gz
          tar -xzf /tmp/node-x64.tar.gz -C /tmp
          echo "X64_NODE=/tmp/node-v${NODE_VERSION}-darwin-x64/bin/node" >> $GITHUB_ENV

      - name: Build SEA binary
        shell: bash
        run: |
          if [ "${{ matrix.cross_arch }}" = "true" ]; then
            pnpm run sea:package:target -- --target ${{ matrix.platform }} --node-binary "$X64_NODE"
          else
            pnpm run sea:package:binary
          fi

      - name: Create archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist/binaries
          tar -czf otel-gui-${{ matrix.platform }}.tar.gz otel-gui-${{ matrix.platform }}/
          shasum -a 256 otel-gui-${{ matrix.platform }}.tar.gz \
            > otel-gui-${{ matrix.platform }}.tar.gz.sha256

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist/binaries
          Compress-Archive -Path otel-gui-${{ matrix.platform }}/ `
            -DestinationPath otel-gui-${{ matrix.platform }}.zip
          (Get-FileHash otel-gui-${{ matrix.platform }}.zip -Algorithm SHA256).Hash + `
            "  otel-gui-${{ matrix.platform }}.zip" | `
            Out-File -Encoding ascii otel-gui-${{ matrix.platform }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: otel-gui-${{ matrix.platform }}
          path: |
            dist/binaries/otel-gui-${{ matrix.platform }}.tar.gz
            dist/binaries/otel-gui-${{ matrix.platform }}.tar.gz.sha256
            dist/binaries/otel-gui-${{ matrix.platform }}.zip
            dist/binaries/otel-gui-${{ matrix.platform }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: Publish Release Assets
    needs: [validate, build]
    if: always() && needs.build.result == 'success' && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          fail_on_unmatched_files: false
          files: artifacts/**
